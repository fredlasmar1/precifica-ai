<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrecificaAI — Avaliação Imobiliária (Goiás)</title>
  <style>
    :root {
      --bg: #0f1923;
      --panel: #16212c;
      --panel2: #1b2733;
      --line: #26384a;
      --green: #25d366;
      --green-d: #128c7e;
      --text: #e8eaed;
      --muted: #8a9bb0;
      --field: #22303d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 70% -10%, #1c3a2e 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---------- Top bar ---------- */
    .topbar {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 28px;
      border-bottom: 1px solid var(--line);
      background: rgba(13,21,28,0.6);
      backdrop-filter: blur(6px);
    }
    .logo {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg, var(--green), var(--green-d));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .brand h1 { font-size: 18px; font-weight: 700; letter-spacing: .2px; }
    .brand span { font-size: 12.5px; color: var(--green); }
    .topbar .spacer { margin-left: auto; }
    .badge {
      font-size: 12px; color: var(--muted);
      border: 1px solid var(--line); border-radius: 20px;
      padding: 5px 12px;
    }

    /* ---------- Layout ---------- */
    .wrap {
      flex: 1; width: 100%; max-width: 1280px;
      margin: 0 auto; padding: 24px 28px 40px;
      display: grid; grid-template-columns: minmax(380px, 460px) 1fr;
      gap: 24px; align-items: start;
    }
    .card {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 16px; overflow: hidden;
    }

    /* ---------- Tabs ---------- */
    .tabs { display: flex; border-bottom: 1px solid var(--line); }
    .tab {
      flex: 1; padding: 14px 16px; text-align: center;
      font-size: 14px; font-weight: 600; color: var(--muted);
      cursor: pointer; background: transparent; border: none;
      border-bottom: 2px solid transparent; transition: all .15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--green); border-bottom-color: var(--green); background: rgba(37,211,102,.06); }

    .pane { display: none; }
    .pane.active { display: block; }

    /* ---------- Form ---------- */
    form { padding: 20px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .field { margin-bottom: 14px; }
    .field.full { grid-column: 1 / -1; }
    label { display: block; font-size: 12.5px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
    input, select, textarea {
      width: 100%; background: var(--field); border: 1px solid var(--line);
      border-radius: 10px; color: var(--text); font-size: 14px;
      padding: 11px 12px; outline: none; font-family: inherit; transition: border .15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--green); }
    select { appearance: none; cursor: pointer; }
    textarea { resize: vertical; min-height: 54px; }
    .btn-primary {
      width: 100%; margin-top: 6px; padding: 13px;
      background: linear-gradient(135deg, var(--green), var(--green-d));
      color: #06231a; font-weight: 700; font-size: 15px;
      border: none; border-radius: 11px; cursor: pointer; transition: filter .15s;
    }
    .btn-primary:hover { filter: brightness(1.08); }
    .btn-primary:disabled { filter: grayscale(.6) brightness(.7); cursor: not-allowed; }
    .hint { font-size: 11.5px; color: var(--muted); margin-top: 10px; text-align: center; }

    /* ---------- Chat ---------- */
    .chat-thread {
      height: 420px; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
      background: #0f1820;
    }
    .chat-thread::-webkit-scrollbar { width: 6px; }
    .chat-thread::-webkit-scrollbar-thumb { background: var(--line); border-radius: 6px; }
    .msg {
      max-width: 88%; padding: 10px 13px; border-radius: 12px;
      font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform: translateY(6px);} to {opacity:1; transform: translateY(0);} }
    .msg.user { background: #075c4b; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.agent { background: #202c33; align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg strong, .msg b { color: var(--green); }
    .chat-input { display: flex; gap: 10px; padding: 12px; border-top: 1px solid var(--line); background: var(--panel2); }
    .chat-input textarea { min-height: 44px; max-height: 120px; }
    .send {
      width: 46px; height: 46px; flex-shrink: 0; border: none; border-radius: 50%;
      background: var(--green); cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .send:hover { background: #1da851; }
    .send:disabled { background: var(--line); cursor: not-allowed; }
    .send svg { width: 18px; height: 18px; fill: #06231a; }

    /* ---------- Result panel ---------- */
    .result {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 16px; min-height: 540px; padding: 0;
      display: flex; flex-direction: column;
    }
    .result-head {
      padding: 16px 22px; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 10px;
    }
    .result-head h2 { font-size: 15px; font-weight: 700; }
    .result-head .tag { margin-left: auto; font-size: 11.5px; color: var(--muted); }
    .laudo {
      flex: 1; padding: 22px 26px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-word;
      font-size: 14.5px; line-height: 1.6;
    }
    .laudo strong, .laudo b { color: var(--green); }
    .laudo a { color: #5fb0ff; }
    .empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      color: var(--muted); padding: 40px; gap: 14px;
    }
    .empty .big { font-size: 46px; opacity: .5; }
    .spinner {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; color: var(--muted);
    }
    .spinner .ring {
      width: 42px; height: 42px; border: 3px solid var(--line);
      border-top-color: var(--green); border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .err { color: #ff6b6b; }

    /* ---------- Responsive ---------- */
    @media (max-width: 900px) {
      .wrap { grid-template-columns: 1fr; padding: 16px; }
      .result { min-height: 360px; }
      .chat-thread { height: 320px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo">🏠</div>
    <div class="brand">
      <h1>PrecificaAI</h1>
      <span>● Avaliação imobiliária — Goiás</span>
    </div>
    <div class="spacer"></div>
    <div class="badge">Dados reais de mercado • IBGE • Mapa</div>
  </div>

  <div class="wrap">
    <!-- ESQUERDA: entrada (abas) -->
    <div class="card">
      <div class="tabs">
        <button class="tab active" id="tab-form" onclick="switchTab('form')">📋 Formulário</button>
        <button class="tab" id="tab-chat" onclick="switchTab('chat')">💬 Chat</button>
      </div>

      <!-- Formulário -->
      <div class="pane active" id="pane-form">
        <form onsubmit="avaliarForm(event)">
          <div class="row">
            <div class="field">
              <label>Tipo do imóvel</label>
              <select id="f-tipo">
                <option value="apartamento">Apartamento</option>
                <option value="casa">Casa</option>
                <option value="terreno">Terreno</option>
                <option value="comercial">Comercial</option>
              </select>
            </div>
            <div class="field">
              <label>Finalidade</label>
              <select id="f-finalidade">
                <option value="venda">Venda</option>
                <option value="aluguel">Aluguel</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label>Cidade</label>
              <input id="f-cidade" value="Anápolis" placeholder="Anápolis" />
            </div>
            <div class="field">
              <label>Bairro</label>
              <input id="f-bairro" placeholder="Ex: Jundiaí" />
            </div>
          </div>

          <div class="field full">
            <label>Endereço / rua <span style="font-weight:400">(opcional, melhora a precisão)</span></label>
            <input id="f-endereco" placeholder="Ex: Rua 7, nº 100" />
          </div>

          <div class="row">
            <div class="field">
              <label>Metragem (m²)</label>
              <input id="f-metragem" type="number" min="1" placeholder="90" />
            </div>
            <div class="field">
              <label>Conservação</label>
              <select id="f-conservacao">
                <option value="novo">Novo</option>
                <option value="bom" selected>Bom</option>
                <option value="regular">Regular</option>
                <option value="reformar">A reformar</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label>Quartos</label>
              <input id="f-quartos" type="number" min="0" placeholder="3" />
            </div>
            <div class="field">
              <label>Vagas de garagem</label>
              <input id="f-vagas" type="number" min="0" placeholder="2" />
            </div>
          </div>

          <div class="field full">
            <label>Diferenciais <span style="font-weight:400">(opcional)</span></label>
            <textarea id="f-diferenciais" placeholder="Ex: varanda gourmet, suíte, andar alto, vista livre..."></textarea>
          </div>

          <button class="btn-primary" id="btn-avaliar" type="submit">Avaliar imóvel →</button>
          <div class="hint">A pesquisa de mercado pode levar de 20 a 60 segundos.</div>
        </form>
      </div>

      <!-- Chat -->
      <div class="pane" id="pane-chat">
        <div class="chat-thread" id="thread"></div>
        <div class="chat-input">
          <textarea id="chat-text" rows="1" placeholder="Descreva o imóvel ou tire uma dúvida..."
                    onkeydown="chatKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send" id="chat-send" onclick="sendChat()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- DIREITA: resultado -->
    <div class="result">
      <div class="result-head">
        <h2>📊 Laudo de Precificação</h2>
        <span class="tag" id="result-tag">aguardando</span>
      </div>
      <div id="result-body">
        <div class="empty" id="result-empty">
          <div class="big">🏠</div>
          <div>Preencha o formulário ao lado<br>ou converse pelo chat<br>para gerar o laudo do imóvel.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const sessionId = 'web_' + Math.random().toString(36).substring(2, 10);
    let busy = false;

    // ---------- Tabs ----------
    function switchTab(which) {
      document.getElementById('tab-form').classList.toggle('active', which === 'form');
      document.getElementById('tab-chat').classList.toggle('active', which === 'chat');
      document.getElementById('pane-form').classList.toggle('active', which === 'form');
      document.getElementById('pane-chat').classList.toggle('active', which === 'chat');
      if (which === 'chat' && !document.getElementById('thread').dataset.init) {
        addMsg('agent', 'Olá! Sou o *PrecificaAI* 🏠\nDescreva o imóvel (tipo, cidade, bairro, m², quartos, vagas, estado) que eu pesquiso o mercado e gero o laudo.');
        document.getElementById('thread').dataset.init = '1';
      }
    }

    // ---------- Formatação ----------
    function fmt(text) {
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>')
        .replace(/\*(.*?)\*/g, '<strong>$1</strong>')
        .replace(/_(.*?)_/g, '<em>$1</em>');
    }

    // ---------- Result panel ----------
    function showSpinner(msg) {
      document.getElementById('result-tag').textContent = 'consultando…';
      document.getElementById('result-body').innerHTML =
        '<div class="spinner"><div class="ring"></div><div>' + (msg || 'Consultando o mercado imobiliário…') + '</div></div>';
    }
    function showLaudo(text) {
      document.getElementById('result-tag').textContent = 'concluído';
      const div = document.createElement('div');
      div.className = 'laudo';
      div.innerHTML = fmt(text);
      const body = document.getElementById('result-body');
      body.innerHTML = '';
      body.appendChild(div);
    }
    function showError(text) {
      document.getElementById('result-tag').textContent = 'erro';
      document.getElementById('result-body').innerHTML =
        '<div class="empty err"><div class="big">⚠️</div><div>' + fmt(text) + '</div></div>';
    }

    // ---------- Formulário ----------
    async function avaliarForm(e) {
      e.preventDefault();
      if (busy) return;
      const payload = {
        tipo: document.getElementById('f-tipo').value,
        finalidade: document.getElementById('f-finalidade').value,
        cidade: document.getElementById('f-cidade').value.trim(),
        bairro: document.getElementById('f-bairro').value.trim(),
        endereco: document.getElementById('f-endereco').value.trim(),
        metragem: document.getElementById('f-metragem').value,
        conservacao: document.getElementById('f-conservacao').value,
        quartos: document.getElementById('f-quartos').value,
        vagas: document.getElementById('f-vagas').value,
        diferenciais: document.getElementById('f-diferenciais').value.trim()
      };
      if (!payload.bairro || !payload.metragem) {
        showError('Preencha pelo menos *bairro* e *metragem*.');
        return;
      }
      busy = true;
      document.getElementById('btn-avaliar').disabled = true;
      showSpinner('Pesquisando anúncios reais, cruzando IBGE e mapa…');
      try {
        const res = await fetch('/api/avaliar', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.error) showError(data.error);
        else showLaudo(data.response);
      } catch (err) {
        showError('Erro de conexão. Tente novamente.');
      } finally {
        busy = false;
        document.getElementById('btn-avaliar').disabled = false;
      }
    }

    // ---------- Chat ----------
    function addMsg(type, text) {
      const t = document.getElementById('thread');
      const div = document.createElement('div');
      div.className = 'msg ' + type;
      div.innerHTML = fmt(text);
      t.appendChild(div);
      t.scrollTop = t.scrollHeight;
    }
    async function sendChat() {
      if (busy) return;
      const input = document.getElementById('chat-text');
      const text = input.value.trim();
      if (!text) return;
      input.value = ''; autoResize(input);
      addMsg('user', text);
      busy = true;
      document.getElementById('chat-send').disabled = true;
      addMsg('agent', '…');
      const placeholder = document.getElementById('thread').lastChild;
      try {
        const res = await fetch('/api/chat', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, message: text })
        });
        const data = await res.json();
        placeholder.remove();
        if (data.error) { addMsg('agent', '❌ ' + data.error); return; }

        // Resposta conversacional vai pro chat; laudo vai pro painel ao lado
        if (data.type === 'laudo') {
          addMsg('agent', '✅ Laudo gerado — veja no painel ao lado.');
          showLaudo(data.response);
        } else {
          addMsg('agent', data.response);
          if (data.followUp) {
            addMsg('agent', '✅ Laudo gerado — veja no painel ao lado.');
            showLaudo(data.followUp);
          }
        }
      } catch (err) {
        placeholder.remove();
        addMsg('agent', '❌ Erro de conexão. Tente novamente.');
      } finally {
        busy = false;
        document.getElementById('chat-send').disabled = false;
        input.focus();
      }
    }
    function chatKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
    }
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }
  </script>
</body>
</html>
